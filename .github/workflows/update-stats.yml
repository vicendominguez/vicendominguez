name: Update GitHub Readme Stats

on:
  schedule:
    # Runs every 12 hours. You can adjust the cron schedule if needed.
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows you to run the action manually from the Actions tab

jobs:
  update-readme-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the new SVGs to your repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Generate your main GitHub Stats card
      - name: Generate GitHub Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=vicendominguez&show_icons=true&theme=bear&hide_title=true&include_all_commits=true&show=reviews,prs_merged,prs_merged_percentage
          path: stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. (Optional) Generate Top Languages card
      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=vicendominguez&layout=compact&theme=default
          path: top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Commit the new SVGs to your repository
      - name: Commit & Push generated SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git commit -m "chore: update github-readme-stats SVGs" || echo "No changes to commit"
          git push
